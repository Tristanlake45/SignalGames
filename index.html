<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vern Eide Games</title>
  <link rel="stylesheet" href="./shared/css/site.css" />
</head>
<body data-depth="0" data-page="home">
  <div data-include="header"></div>

  <header class="home-topbar">
    <div class="home-brand">
      <h1>VERN EIDE GAMES</h1>
      <p>Daily games built for the Vern Eide Signal</p>
    </div>

    <div class="home-actions">
      <button id="themeToggle" class="btn btn-secondary" type="button" aria-label="Toggle theme">
        Light / Dark
      </button>
    </div>
  </header>

  <main class="page-wrap">
    <section class="game-grid">
      <a class="game-card" href="./verdle/">
        <div class="game-card__head">
          <h2>Verdle</h2>
          <span>Daily word game</span>
        </div>

        <div class="verdle-preview">
          <div class="vp-row">
            <div class="vp-tile vp-correct">C</div>
            <div class="vp-tile vp-present">A</div>
            <div class="vp-tile vp-absent">R</div>
            <div class="vp-tile"></div>
            <div class="vp-tile"></div>
          </div>
          <div class="vp-row">
            <div class="vp-tile"></div>
            <div class="vp-tile"></div>
            <div class="vp-tile"></div>
            <div class="vp-tile"></div>
            <div class="vp-tile"></div>
          </div>
          <div class="vp-row">
            <div class="vp-tile"></div>
            <div class="vp-tile"></div>
            <div class="vp-tile"></div>
            <div class="vp-tile"></div>
            <div class="vp-tile"></div>
          </div>
        </div>
      </a>

      <a class="game-card" href="./sudoku/">
        <div class="game-card__head">
          <h2>Sudoku</h2>
          <span>Daily easy, medium, and hard</span>
        </div>

        <div class="sudoku-preview">
          <div class="sp-grid">
            <div>5</div><div></div><div>8</div><div></div><div>2</div><div></div><div>7</div><div></div><div>1</div>
            <div></div><div>3</div><div></div><div>7</div><div></div><div>9</div><div></div><div>5</div><div></div>
            <div>1</div><div></div><div>7</div><div></div><div>4</div><div></div><div>3</div><div></div><div>6</div>

            <div></div><div>7</div><div></div><div>1</div><div></div><div>4</div><div></div><div>2</div><div></div>
            <div>8</div><div></div><div>1</div><div></div><div>6</div><div></div><div>4</div><div></div><div>5</div>
            <div></div><div>4</div><div></div><div>9</div><div></div><div>5</div><div></div><div>1</div><div></div>

            <div>9</div><div></div><div>3</div><div></div><div>5</div><div></div><div>1</div><div></div><div>8</div>
            <div></div><div>8</div><div></div><div>6</div><div></div><div>1</div><div></div><div>4</div><div></div>
            <div>4</div><div></div><div>6</div><div></div><div>8</div><div></div><div>5</div><div></div><div>2</div>
          </div>
        </div>
      </a>
    </section>
  </main>

  <script src="./shared/js/include.js"></script>
  <script>
    (() => {
      const THEME_KEY = "verdleTheme";
      const themeToggleBtn = document.getElementById("themeToggle");

      function applyTheme(theme) {
        const safeTheme = theme === "light" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", safeTheme);
        localStorage.setItem(THEME_KEY, safeTheme);
      }

      function initTheme() {
        const stored = localStorage.getItem(THEME_KEY);
        applyTheme(stored || "dark");
      }

      if (themeToggleBtn) {
        themeToggleBtn.addEventListener("click", () => {
          const current = document.documentElement.getAttribute("data-theme");
          applyTheme(current === "dark" ? "light" : "dark");
        });
      }

      initTheme();
    })();
  </script>
</body>
</html>
