<!-- index.html -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VERDLE | Vern Eide Word Game</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <h1>VERDLE</h1>
      <p>The Vern Eide Word Game</p>
    </div>

    <div class="topbar-actions">
      <button id="themeToggle" class="btn btn-secondary" type="button" aria-label="Toggle theme">
        Light / Dark
      </button>
    </div>
  </header>

  <main class="wrap">
    <section id="board" class="board" aria-label="Game board">
      <!-- 6 rows × 5 tiles (kept static to match your IDs) -->
      <div class="row">
        <div class="tile" id="tile-0-0"></div><div class="tile" id="tile-0-1"></div><div class="tile" id="tile-0-2"></div><div class="tile" id="tile-0-3"></div><div class="tile" id="tile-0-4"></div>
      </div>
      <div class="row">
        <div class="tile" id="tile-1-0"></div><div class="tile" id="tile-1-1"></div><div class="tile" id="tile-1-2"></div><div class="tile" id="tile-1-3"></div><div class="tile" id="tile-1-4"></div>
      </div>
      <div class="row">
        <div class="tile" id="tile-2-0"></div><div class="tile" id="tile-2-1"></div><div class="tile" id="tile-2-2"></div><div class="tile" id="tile-2-3"></div><div class="tile" id="tile-2-4"></div>
      </div>
      <div class="row">
        <div class="tile" id="tile-3-0"></div><div class="tile" id="tile-3-1"></div><div class="tile" id="tile-3-2"></div><div class="tile" id="tile-3-3"></div><div class="tile" id="tile-3-4"></div>
      </div>
      <div class="row">
        <div class="tile" id="tile-4-0"></div><div class="tile" id="tile-4-1"></div><div class="tile" id="tile-4-2"></div><div class="tile" id="tile-4-3"></div><div class="tile" id="tile-4-4"></div>
      </div>
      <div class="row">
        <div class="tile" id="tile-5-0"></div><div class="tile" id="tile-5-1"></div><div class="tile" id="tile-5-2"></div><div class="tile" id="tile-5-3"></div><div class="tile" id="tile-5-4"></div>
      </div>
    </section>

    <section class="below">
      <div id="message" class="message" role="status" aria-live="polite"></div>

      <div class="controls">
        <button id="resetBtn" class="btn" type="button">Play Again</button>
      </div>

      <section class="keyboard-wrap" aria-label="On-screen keyboard">
        <div id="keyboard" class="keyboard"></div>
      </section>
    </section>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
