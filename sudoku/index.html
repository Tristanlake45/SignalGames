<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sudoku | Vern Eide Games</title>
  <script>
    (() => {
      const theme = localStorage.getItem("verdleTheme") || "dark";
      document.documentElement.setAttribute("data-theme", theme === "light" ? "light" : "dark");
    })();
  </script>
  <link rel="stylesheet" href="../shared/css/site.css" />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="prefetch" href="/SignalGames/" />
  <link rel="prefetch" href="/SignalGames/verdle/" />
</head>
<body data-page="sudoku">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-logo" href="../">Vern Eide Games</a>
  
      <nav class="site-nav" aria-label="Game navigation">
        <a href="../verdle/">Verdle</a>
        <a href="../sudoku/" class="active">Sudoku</a>
      </nav>
    </div>
  </header>

  <header class="topbar">
    <div class="brand">
      <h1>SUDOKU</h1>
      <p>The Vern Eide Number Game</p>
    </div>

    <div class="topbar-actions">
      <button id="themeToggle" class="btn btn-secondary" type="button" aria-label="Toggle theme">
        Light / Dark
      </button>
    </div>
  </header>

  <main class="sudoku-wrap">
    <section class="sudoku-panel">
      <div class="sudoku-toolbar">
        <button class="difficulty-btn btn btn-secondary active" data-difficulty="easy">Easy</button>
        <button class="difficulty-btn btn btn-secondary" data-difficulty="medium">Medium</button>
        <button class="difficulty-btn btn btn-secondary" data-difficulty="hard">Hard</button>
      </div>

      <div class="sudoku-meta">
        <div id="checkInfo" class="check-info">Checks left: 1</div>
      </div>

      <div id="sudokuBoard" class="sudoku-board" aria-label="Sudoku board"></div>

      <div class="sudoku-actions">
        <div id="numberTray" class="number-tray" aria-label="Number controls">
          <button class="tray-num btn btn-secondary" type="button" data-number="1">1</button>
          <button class="tray-num btn btn-secondary" type="button" data-number="2">2</button>
          <button class="tray-num btn btn-secondary" type="button" data-number="3">3</button>
          <button class="tray-num btn btn-secondary" type="button" data-number="4">4</button>
          <button class="tray-num btn btn-secondary" type="button" data-number="5">5</button>
          <button class="tray-num btn btn-secondary" type="button" data-number="6">6</button>
          <button class="tray-num btn btn-secondary" type="button" data-number="7">7</button>
          <button class="tray-num btn btn-secondary" type="button" data-number="8">8</button>
          <button class="tray-num btn btn-secondary" type="button" data-number="9">9</button>
        </div>

        <button id="checkBtn" class="btn" type="button">Check Board</button>
        <button id="clearBtn" class="btn btn-warning" type="button">Clear Board</button>
      </div>
    </section>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
